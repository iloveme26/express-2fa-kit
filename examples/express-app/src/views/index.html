<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>express-2fa-kit example</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page page-center hero">
    <div class="logo-mark" id="logoMark">express</div>
    <h1 id="heroTitle"></h1>
    <p class="subtitle" id="heroSubtitle">
      A minimal demo of express-2fa-kit — TOTP, SMS, and email codes, backed by an in-memory
      store. SMS/email codes are logged to the server console (mock delivery).
    </p>

    <div class="button-group" id="heroButtons">
      <a class="btn large" href="/register.html">Sign up</a>
      <a class="btn large secondary" href="/login.html">Log in</a>
    </div>
  </div>

  <script>
    const HERO_TITLE = "Two-factor auth, wired up in minutes";
    const titleEl = document.getElementById("heroTitle");
    const logoEl = document.getElementById("logoMark");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function revealRest() {
      document.getElementById("heroSubtitle").classList.add("reveal");
      document.getElementById("heroButtons").classList.add("reveal");
    }

    if (prefersReducedMotion) {
      titleEl.textContent = HERO_TITLE;
      logoEl.classList.add("pop");
      revealRest();
    } else {
      titleEl.classList.add("typing");
      let i = 0;
      const typeNext = () => {
        titleEl.textContent = HERO_TITLE.slice(0, i);
        i++;
        if (i <= HERO_TITLE.length) {
          setTimeout(typeNext, 32);
        } else {
          titleEl.classList.remove("typing");
          logoEl.classList.add("pop");
          setTimeout(revealRest, 500);
        }
      };
      setTimeout(typeNext, 300);
    }
  </script>
</body>
</html>
